{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | EMR CRM</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-neutral text-primary font-sans antialiased min-h-screen flex items-center justify-center px-4">

    <div class="max-w-lg w-full text-center">

        <!-- Error Code -->
        <div class="mb-6">
            <span class="text-8xl font-bold text-primary opacity-10 select-none">404</span>
        </div>

        <!-- Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-gray-100 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-primary mb-3">Page Not Found</h1>
        <p class="text-secondary mb-8">
            The page you're looking for doesn't exist or has been moved.
            <br class="hidden sm:block">
            Let's get you back to somewhere useful.
        </p>

        <!-- Navigation Links -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="{% url 'dashboard' %}"
               class="px-5 py-2.5 bg-primary text-white text-sm font-medium rounded-lg hover:bg-opacity-90 transition shadow-sm">
                Go to Dashboard
            </a>
            <a href="{% url 'customers:list' %}"
               class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition shadow-sm">
                Customers
            </a>
            <a href="{% url 'devices:list' %}"
               class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition shadow-sm">
                Devices
            </a>
            <a href="{% url 'repairs:list' %}"
               class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition shadow-sm">
                Repairs
            </a>
        </div>

        <!-- Footer -->
        <p class="text-xs text-secondary">
            EMR CRM &copy; 2026
        </p>

    </div>

</body>
</html>
