{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error | EMR CRM</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-neutral text-primary font-sans antialiased min-h-screen flex items-center justify-center px-4">

    <div class="max-w-lg w-full text-center">

        <!-- Error Code -->
        <div class="mb-6">
            <span class="text-8xl font-bold text-primary opacity-10 select-none">500</span>
        </div>

        <!-- Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-red-50 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-primary mb-3">Something Went Wrong</h1>
        <p class="text-secondary mb-8">
            An unexpected error occurred on our end.
            <br class="hidden sm:block">
            Please try again or return to the dashboard.
        </p>

        <!-- Navigation Links -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="/dashboard/"
               class="px-5 py-2.5 bg-primary text-white text-sm font-medium rounded-lg hover:bg-opacity-90 transition shadow-sm">
                Go to Dashboard
            </a>
            <a href="javascript:history.back()"
               class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition shadow-sm">
                Go Back
            </a>
        </div>

        <!-- Footer -->
        <p class="text-xs text-secondary">
            EMR CRM &copy; 2026
        </p>

    </div>

</body>
</html>
