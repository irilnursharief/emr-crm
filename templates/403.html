{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Access Denied | EMR CRM</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-neutral text-primary font-sans antialiased min-h-screen flex items-center justify-center px-4">

    <div class="max-w-lg w-full text-center">

        <!-- Error Code -->
        <div class="mb-6">
            <span class="text-8xl font-bold text-primary opacity-10 select-none">403</span>
        </div>

        <!-- Icon -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-yellow-50 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-bold text-primary mb-3">Access Denied</h1>
        <p class="text-secondary mb-8">
            You don't have permission to access this page.
            <br class="hidden sm:block">
            Please contact your administrator if you think this is a mistake.
        </p>

        <!-- Navigation Links -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <a href="{% url 'dashboard' %}"
               class="px-5 py-2.5 bg-primary text-white text-sm font-medium rounded-lg hover:bg-opacity-90 transition shadow-sm">
                Go to Dashboard
            </a>
            <a href="javascript:history.back()"
               class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition shadow-sm">
                Go Back
            </a>
        </div>

        <!-- Footer -->
        <p class="text-xs text-secondary">
            EMR CRM &copy; 2026
        </p>

    </div>

</body>
</html>
