<aside class="w-64 flex-shrink-0 bg-gray-800 border-r border-gray-700/50 flex flex-col">
    <!-- Logo -->
    <div class="h-16 flex items-left justify-left px-4">
        <a href="{% url 'dashboard' %}" class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </div>
            <span class="text-white font-bold text-lg">EMR-CRM</span>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="{% url 'dashboard' %}" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg hover:bg-gray-700 hover:text-white transition-colors duration-200
            {% if current_url_name == 'dashboard' %}
             bg-gray-700 text-white
            {% else %}
                text-gray-400 hover:bg-gray-700 hover:text-white
            {% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            Dashboard
        </a>
        <a  href="{% url 'customers:list' %}" 
            class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg transition-colors duration-200
            {% if current_app == 'customers' and current_url_name == 'list' %}
             bg-gray-700 text-white
            {% else %}
                text-gray-400 hover:bg-gray-700 hover:text-white
            {% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A5.995 5.995 0 003 14v7h12v-1a6 6 0 00-9-5.197z"></path></svg>
            Customers
        </a>
        <a href="{% url 'devices:list' %}" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors duration-200
            {% if current_app == 'devices'%}
             bg-gray-700 text-white
            {% else %}
                text-gray-400 hover:bg-gray-700 hover:text-white
            {% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            Devices
        </a>
        <a href="{% url 'repairs:list' %}" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors duration-200
            {% if current_app == 'repairs'%}
             bg-gray-700 text-white
            {% else %}
                text-gray-400 hover:bg-gray-700 hover:text-white
            {% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            Repairs
        </a>
    </nav>

    <!-- User Profile / Logout -->
    <div class="px-4 py-4 border-t border-gray-700/50">
        <div class="flex items-center">
            <div class="flex-shrink-0">
                <div class="w-10 h-10 bg-gray-600 rounded-full flex items-center justify-center text-white font-bold">
                    {{ user.username.0|upper }}
                </div>
            </div>
            <div class="ml-3">
                <p class="text-sm font-medium text-white">{{ user.get_full_name|default:user.username }}</p>
                <p class="text-xs text-gray-400">{{ user.get_role_display }}</p>
            </div>
        </div>
        <form method="POST" action="{% url 'logout' %}" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="w-full flex items-center justify-left px-4 py-2 text-sm font-medium text-gray-300 rounded-lg hover:bg-gray-700 hover:text-white transition-colors duration-200">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </form>
    </div>
</aside>
