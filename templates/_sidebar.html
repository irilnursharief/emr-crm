<aside class="w-64 h-full shrink-0 bg-primary text-white flex flex-col transition-all duration-300">

    <!-- Logo -->
    <div class="h-16 flex items-center justify-between px-4 border-b border-white/10">
        <a href="{% url 'dashboard' %}" class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">L</span>
            </div>
            <span class="font-bold text-lg">EMR CRM</span>
        </a>

        <!-- Mobile Close Button -->
        <button id="sidebar-close-btn"
                class="lg:hidden p-2 rounded-lg hover:bg-white/10 transition">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6 space-y-2">

        {% with base_class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg transition-all duration-200" %}

        <a href="{% url 'dashboard' %}"
           class="{{ base_class }}
           {% if current_url_name == 'dashboard' %}
                bg-white/10 text-white
           {% else %}
                text-white/70 hover:bg-white/10 hover:text-white
           {% endif %}">
            Dashboard
        </a>

        <a href="{% url 'customers:list' %}"
           class="{{ base_class }}
           {% if current_app == 'customers' %}
                bg-white/10 text-white
           {% else %}
                text-white/70 hover:bg-white/10 hover:text-white
           {% endif %}">
            Customers
        </a>

        <a href="{% url 'devices:list' %}"
           class="{{ base_class }}
           {% if current_app == 'devices' %}
                bg-white/10 text-white
           {% else %}
                text-white/70 hover:bg-white/10 hover:text-white
           {% endif %}">
            Devices
        </a>

        <a href="{% url 'repairs:list' %}"
           class="{{ base_class }}
           {% if current_app == 'repairs' %}
                bg-white/10 text-white
           {% else %}
                text-white/70 hover:bg-white/10 hover:text-white
           {% endif %}">
            Repairs
        </a>

        {% endwith %}
    </nav>

    <!-- User Section -->
    <div class="px-4 py-4 border-t border-white/10">
        <p class="text-sm text-white font-medium">
            {{ user.get_full_name|default:user.username }}
        </p>
        <p class="text-xs text-white/60 mb-3">
            {{ user.get_role_display }}
        </p>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="cursor-pointer w-full px-4 py-2 bg-white/10 hover:bg-white/20 text-white text-sm rounded-lg transition">
                Logout
            </button>
        </form>
    </div>

</aside>
