{% extends "base.html" %}

{% block title %}Dashboard — Hardware Repair CRM{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <h1 class="text-3xl font-bold text-white mb-4">Welcome, {{ user.username }}</h1>
        <p class="text-gray-400 mb-6">Role: {{ user.get_role_display }}</p>
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl transition duration-200">
                Logout
            </button>
        </form>
    </div>
</div>
{% endblock %}
