version: '3.8'

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME:-emr_db}
      POSTGRES_USER: ${DB_USER:-emr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emr_password}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-emr_user} -d ${DB_NAME:-emr_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    container_name: emr-crm-web
    command: ./entrypoint.sh
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    restart: unless-stopped

volumes:
  postgres_data_prod:
    driver: local
